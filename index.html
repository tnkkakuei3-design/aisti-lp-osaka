  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --navy:#1B2838;--navy-light:#2C3E50;
      --gold:#C8956C;--gold-light:#D4A574;--gold-bg:#FAF6F2;
      --bg:#F7F8FA;--card:#FFFFFF;
      --text:#1B2838;--text-mid:#5A6577;--text-light:#8E99A8;
      --border:#E8ECF0;--line-green:#06C755;
      --shadow-sm:0 1px 3px rgba(27,40,56,.06);
      --shadow-md:0 4px 12px rgba(27,40,56,.08);
      --shadow-lg:0 8px 30px rgba(27,40,56,.12);
      --radius:14px;--radius-sm:10px
    }
    body{font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

    /* ===== HEADER ===== */
    .header{
      background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
      padding:14px 20px 10px;flex-shrink:0;z-index:20;position:relative;
    }
    .header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-light),transparent)}
    .header-inner{display:flex;align-items:center;justify-content:space-between;max-width:480px;margin:0 auto}
    .logo{display:flex;align-items:center;text-decoration:none}
    .logo-text{font-size:15px;font-weight:700;color:#fff;letter-spacing:.02em}
    .logo-sub{font-size:9px;font-weight:400;color:rgba(255,255,255,.65);display:block;letter-spacing:.08em;margin-top:-1px}
    .progress-wrap{max-width:480px;margin:8px auto 0;display:flex;align-items:center;gap:8px}
    .progress-bar{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;background:var(--gold-light);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}
    .progress-pct{font-size:10px;color:rgba(255,255,255,.6);font-weight:600;min-width:28px;text-align:right}

    /* ===== TRUST BAR ===== */
    .trust-bar{display:flex;justify-content:center;gap:18px;padding:10px 16px;background:var(--gold-bg);border-bottom:1px solid var(--border);flex-shrink:0}
    .trust-bar span{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--navy)}
    .trust-bar .t-icon{width:16px;height:16px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .trust-bar .t-icon svg{width:9px;height:9px;fill:var(--gold)}

    /* ===== CHAT AREA ===== */
    .chat-area{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto;width:100%;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background-image:radial-gradient(circle,#E0E4E8 .5px,transparent .5px);background-size:16px 16px}

    .msg-bot{display:flex;align-items:flex-start;gap:10px;opacity:0;transform:translateY(12px);animation:msgIn .4s cubic-bezier(.16,1,.3,1) forwards}
    .msg-bot .avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:var(--navy);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px var(--gold),var(--shadow-sm)}
    .msg-bot .avatar svg{width:20px;height:20px;fill:var(--gold)}
    .msg-bot .bubble{background:var(--card);padding:14px 16px;border-radius:4px var(--radius) var(--radius) var(--radius);box-shadow:var(--shadow-md);max-width:80%;font-size:14px;line-height:1.75;color:var(--text);border:1px solid var(--border)}
    .msg-bot .bubble b{color:var(--navy)}
    .msg-bot .bubble small{color:var(--text-light)}

    .msg-user{display:flex;justify-content:flex-end;opacity:0;transform:translateY(12px);animation:msgIn .4s cubic-bezier(.16,1,.3,1) forwards}
    .msg-user .bubble{background:var(--navy);color:#fff;padding:11px 16px;border-radius:var(--radius) 4px var(--radius) var(--radius);max-width:70%;font-size:14px;line-height:1.5;font-weight:500;box-shadow:var(--shadow-sm)}

    .typing{display:flex;align-items:flex-start;gap:10px}
    .typing .dots{display:flex;gap:5px;padding:16px 18px;background:var(--card);border-radius:4px var(--radius) var(--radius) var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--border)}
    .typing .dots span{width:6px;height:6px;background:var(--text-light);border-radius:50%;animation:bounce 1.4s ease-in-out infinite}
    .typing .dots span:nth-child(2){animation-delay:.15s}
    .typing .dots span:nth-child(3){animation-delay:.3s}

    /* ===== INPUT AREA ===== */
    .input-area{background:var(--card);padding:14px 16px;padding-bottom:max(14px,env(safe-area-inset-bottom));border-top:1px solid var(--border);flex-shrink:0;z-index:10}
    .input-inner{max-width:480px;margin:0 auto}

    /* 物件種別アイコンボタン */
    .choices.with-icons{gap:8px}
    .choices.with-icons button{flex-direction:column;gap:4px;padding:10px 6px 8px;min-height:72px}
    .choices.with-icons button svg{width:32px;height:32px;color:var(--gold);flex-shrink:0;transition:color .2s}
    .choices.with-icons button:hover svg{color:var(--navy)}
    .choices.with-icons button.confirmed svg{color:#fff}
    .choices.with-icons button .btn-label{font-size:11px;line-height:1.2}

    .choices{display:flex;flex-wrap:wrap;gap:8px}
    .choices button{flex:1 1 calc(50% - 4px);min-width:90px;min-height:48px;padding:14px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);text-align:center;-webkit-tap-highlight-color:transparent;position:relative;display:flex;align-items:center;justify-content:center}
    .choices button:hover{border-color:var(--navy);background:var(--gold-bg)}
    .choices button:active{transform:scale(.97)}
    .choices.cols-3 button{flex:1 1 calc(33.33% - 6px);min-width:80px;padding:12px 4px;font-size:13px}
    .choices button.confirmed{background:var(--navy);color:#fff;border-color:var(--navy)}
    .choices button.confirmed::after{content:'';display:inline-block;width:12px;height:7px;margin-left:6px;border-left:2px solid var(--gold);border-bottom:2px solid var(--gold);transform:rotate(-45deg);position:relative;top:-2px}

    .search-list-wrap{display:flex;flex-direction:column;gap:8px}
    .search-input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--card)}
    .search-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,40,56,.08)}
    .search-input::placeholder{color:var(--text-light)}
    .search-list{max-height:220px;overflow-y:auto;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card)}
    .search-list .area-header{padding:8px 14px;font-size:11px;font-weight:700;color:var(--text-light);background:var(--gold-bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;letter-spacing:.05em}
    .search-list-item{padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:500;transition:background .15s;-webkit-tap-highlight-color:transparent;min-height:48px;display:flex;align-items:center}
    .search-list-item:last-child{border-bottom:none}
    .search-list-item:active{background:var(--gold-bg)}
    .search-list-item.hidden{display:none}


    .submit-btn{width:100%;padding:15px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .submit-btn:active{transform:scale(.98);opacity:.9}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed}

    .back-btn{display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text-mid);text-decoration:underline;text-underline-offset:3px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:10px;text-align:center;width:100%;min-height:40px;padding:4px;transition:color .2s}
    .back-btn:hover{color:var(--text)}

    /* ===== LINE CTA（固定表示） ===== */
    .line-cta-fixed{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--border);box-shadow:0 -4px 12px rgba(0,0,0,.08);display:none;flex-direction:column;align-items:center;gap:6px}
    .line-cta-fixed .line-cta{max-width:480px;width:100%;margin:0}
    .line-cta-fixed .cta-sub{max-width:480px;margin:0}
    .line-cta-fixed-inner{max-width:480px;margin:0 auto;width:100%;display:flex;flex-direction:column;align-items:center;gap:6px}
    .line-cta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px;min-height:52px;background:var(--line-green);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;transition:all .2s;-webkit-tap-highlight-color:transparent;animation:ctaPulse 2.5s cubic-bezier(.4,0,.6,1) infinite}
    .line-cta:active{opacity:.9;transform:scale(.98);animation:none}
    .line-cta svg{width:22px;height:22px;fill:#fff;flex-shrink:0}
    @keyframes ctaPulse{0%,100%{box-shadow:0 0 0 0 rgba(6,199,85,.35)}50%{box-shadow:0 0 0 12px rgba(6,199,85,0)}}
    .cta-sub{text-align:center;font-size:11px;color:var(--text-light);margin-top:8px;line-height:1.7}
    .cta-sub strong{color:var(--navy);font-size:13px}

    /* ===== RESULT CARD ===== */
    .result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:22px 20px;margin-top:14px;border:1px solid var(--border)}
    .result-card h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--navy);letter-spacing:.02em}
    .result-summary{display:flex;flex-direction:column}
    .result-summary .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
    .result-summary .row:last-child{border-bottom:none}
    .result-summary .label{color:var(--text-light);font-weight:500}
    .result-summary .value{font-weight:600;color:var(--text)}

    .price-estimate{margin-top:16px;padding:18px 16px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);border-radius:var(--radius-sm);color:#fff;text-align:center}
    .price-estimate .est-label{font-size:11px;font-weight:500;opacity:.7;letter-spacing:.08em}
    .price-estimate .est-price{font-size:28px;font-weight:700;color:var(--gold-light);margin:6px 0 2px;line-height:1.2}
    .price-estimate .est-unit{font-size:15px;font-weight:600}
    .price-estimate .est-note{font-size:10px;opacity:.55;margin-top:4px}
    .price-estimate .est-blurred{filter:blur(6px);user-select:none;-webkit-user-select:none;display:inline}

    .footer-links{text-align:center;padding:6px;font-size:10px;flex-shrink:0}
    .footer-links a{color:var(--text-light);text-decoration:none;font-weight:500}

    @keyframes msgIn{to{opacity:1;transform:translateY(0)}}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

    @media(max-width:380px){
      .header{padding:12px 14px 8px}.logo-text{font-size:13px}
      .trust-bar{gap:12px;padding:8px 12px}.trust-bar span{font-size:10px}
      .chat-area{padding:14px 12px;gap:12px}
      .msg-bot .bubble{padding:12px 13px;font-size:13.5px;max-width:84%}
      .choices button{padding:12px 6px;font-size:13px}
      .choices.cols-3 button{font-size:12px;padding:11px 3px}
      .result-card{padding:18px 16px}
      .price-estimate .est-price{font-size:24px}
      .line-cta{padding:15px;font-size:15px}
    }
    @supports(-webkit-touch-callout:none){body{height:-webkit-fill-available}}
  </style>
</head>

/* ===== ChatFormクラス ===== */
class ChatForm{
  constructor(){
    this.stepIndex=0;this.answers={};this.stepHistory=[];this.isProcessing=false;this.isComplete=false;this.isCompleted=false;
    this.chatArea=document.getElementById('chatArea');this.inputInner=document.getElementById('inputInner');
    this.progressFill=document.getElementById('progressFill');this.progressPct=document.getElementById('progressPct');
    this.totalSteps=STEPS.length;
    const p=new URLSearchParams(location.search);
    this.trackingData={utm_source:p.get('utm_source')||'',utm_medium:p.get('utm_medium')||'',utm_campaign:p.get('utm_campaign')||'',utm_term:p.get('utm_term')||'',ttclid:p.get('ttclid')||'',landing_url:location.href};
    window.addEventListener('beforeunload',e=>{if(!this.isComplete&&this.stepIndex>0&&this.stepIndex<this.totalSteps){e.preventDefault();e.returnValue=''}});
    this.start();
  }
  delay(ms){return new Promise(r=>setTimeout(r,ms))}
  scrollToBottom(){requestAnimationFrame(()=>{this.chatArea.scrollTop=this.chatArea.scrollHeight});setTimeout(()=>{this.chatArea.scrollTop=this.chatArea.scrollHeight},350)}
  updateProgress(){const pct=Math.min(100,Math.round((this.stepIndex+1)/this.totalSteps*100));this.progressFill.style.width=pct+'%';this.progressPct.textContent=pct+'%'}
  trackEvent(ev,data){if(typeof ttq!=='undefined')try{ttq.track(ev,data||{})}catch(e){}}

  async addBotMessage(html){
    const t=document.createElement('div');t.className='msg-bot typing';
    t.innerHTML=`<div class="avatar">${SVG_AVATAR}</div><div class="dots"><span></span><span></span><span></span></div>`;
    this.chatArea.appendChild(t);this.scrollToBottom();await this.delay(450+Math.random()*400);t.remove();
    const el=document.createElement('div');el.className='msg-bot';
    el.innerHTML=`<div class="avatar">${SVG_AVATAR}</div><div class="bubble">${html}</div>`;
    this.chatArea.appendChild(el);this.scrollToBottom();return el;
  }
  addUserMessage(text){const el=document.createElement('div');el.className='msg-user';const b=document.createElement('div');b.className='bubble';b.textContent=text;el.appendChild(b);this.chatArea.appendChild(el);this.scrollToBottom();return el}

  async start(){
    this.updateProgress();
    await this.addBotMessage(`こんにちは！<br>アイスティ不動産の<b>無料査定</b>です。<br><b>${AREA}</b>のマンション、今いくらか気になりませんか？`);
    await this.delay(400);
    const chartMsg=document.createElement('div');chartMsg.className='msg-bot';
    chartMsg.innerHTML='<div class="avatar">'+SVG_AVATAR+'</div><div class="bubble">実は、査定額って会社によって<b>数百万円</b>も変わることがあるんです。'+PRICE_CHART_SVG+'</div>';
    this.chatArea.appendChild(chartMsg);this.scrollToBottom();
    await this.delay(600);
    await this.showStep(0);
  }

  async showStep(index){
    this.stepIndex=index;this.updateProgress();const step=STEPS[index];
    const eb=this.chatArea.childElementCount;await this.addBotMessage(step.question);
    this.inputInner.innerHTML='';
    if(step.type==='choice')this.renderChoices(step);
    else if(step.type==='searchable_list')this.renderSearchableList(step);
    if(index>0){const b=document.createElement('button');b.className='back-btn';b.textContent='← 前の質問に戻る';b.onclick=async()=>{await this.goBack()};this.inputInner.appendChild(b)}
    this.stepHistory[index]=this.chatArea.childElementCount-eb;
    this.trackEvent('ViewContent',{content_name:step.id,content_type:'step'});
    if(typeof dataLayer!=='undefined'){dataLayer.push({event:'chat_step_view',step_number:index+1,step_id:step.id,step_total:this.totalSteps});}
  }

  renderChoices(step){
    const w=document.createElement('div');w.className='choices';
    const hasIcons=step.id==='property_type';
    if(step.options.length>=5)w.classList.add('cols-3');
    if(hasIcons)w.classList.add('with-icons');
    step.options.forEach(o=>{
      const b=document.createElement('button');
      if(hasIcons&&PROP_ICONS[o.label]){
        b.innerHTML=PROP_ICONS[o.label]+'<span class="btn-label">'+o.label+'</span>';
      }else{b.textContent=o.label}
      b.onclick=()=>this.selectChoice(step,o);w.appendChild(b);
    });
    this.inputInner.appendChild(w);
  }

  // 一棟系物件タイプの判定（専有面積スキップ対象）
  isBulkProperty(propertyType){return ['ビル一棟','マンション一棟','アパート一棟'].includes(propertyType)}

  // 次に表示すべきステップのインデックスを返す（スキップ考慮）
  getNextStepIndex(currentIndex){
    let next=currentIndex+1;
    // floor_area（index=2）は一棟系物件の場合にスキップ
    if(next<STEPS.length&&STEPS[next].id==='floor_area'&&this.isBulkProperty(this.answers.property_type)){
      next++;
    }
    return next;
  }

  // 前に表示すべきステップのインデックスを返す（スキップ考慮）
  getPrevStepIndex(currentIndex){
    let prev=currentIndex-1;
    // floor_area（index=2）は一棟系物件の場合にスキップして戻る
    if(prev>=0&&STEPS[prev].id==='floor_area'&&this.isBulkProperty(this.answers.property_type)){
      prev--;
    }
    return prev;
  }

  async selectChoice(step,opt){
    if(this.isProcessing)return;this.isProcessing=true;
    const btns=this.inputInner.querySelectorAll('.choices button');btns.forEach(b=>b.disabled=true);
    const sel=Array.from(btns).find(b=>{const lbl=b.querySelector('.btn-label');return (lbl?lbl.textContent:b.textContent)===opt.label;});if(sel)sel.classList.add('confirmed');
    await this.delay(350);this.answers[step.id]=opt.value;this.addUserMessage(opt.label);
    this.inputInner.innerHTML='';await this.delay(200);this.isProcessing=false;
    const next=this.getNextStepIndex(this.stepIndex);
    if(next>=this.totalSteps)await this.showComplete();else await this.showStep(next);
  }

  renderSearchableList(step){
    const w=document.createElement('div');w.className='search-list-wrap';
    const input=document.createElement('input');input.className='search-input';input.type='text';
    input.placeholder=step.placeholder||'検索…';input.autocomplete='off';input.setAttribute('autocorrect','off');input.setAttribute('autocapitalize','off');
    w.appendChild(input);
    const list=document.createElement('div');list.className='search-list';
    const items=step.items||[];
    if(items.length===0){
      w.innerHTML='';const fi=document.createElement('input');fi.className='search-input';fi.type='text';fi.placeholder='町名を入力';fi.autocomplete='off';w.appendChild(fi);
      const fb=document.createElement('button');fb.className='submit-btn';fb.textContent='次へ進む';
      fb.onclick=()=>{const v=fi.value.trim();if(!v){fi.style.borderColor='#E74C3C';return}this.selectListItem(step,v)};
      w.appendChild(fb);this.inputInner.appendChild(w);return;
    }
    items.forEach(item=>{const d=document.createElement('div');d.className='search-list-item';d.textContent=item;d.onclick=()=>this.selectListItem(step,item);list.appendChild(d)});
    w.appendChild(list);this.inputInner.appendChild(w);
    input.addEventListener('input',()=>{
      const q=input.value.trim().toLowerCase();
      list.querySelectorAll('.search-list-item').forEach(el=>{el.classList.toggle('hidden',q!==''&&!el.textContent.toLowerCase().includes(q))});
    });
  }

  async selectListItem(step,value){
    if(this.isProcessing)return;this.isProcessing=true;
    this.answers[step.id]=value;this.addUserMessage(value);this.inputInner.innerHTML='';
    await this.delay(250);this.isProcessing=false;
    const next=this.getNextStepIndex(this.stepIndex);
    if(next>=this.totalSteps)await this.showComplete();else await this.showStep(next);
  }

  calcEstimatedPrice(){
    // 大阪市全域対応・物件種別6種対応の価格算出ロジック
    const type=this.answers.property_type||'マンション';
    // 大阪市は全国第2位級の地価・不動産価格帯（汎用版tBランク相当）
    const basePriceByType={
      'マンション':{area:{'〜20㎡':[800,1500],'20〜40㎡':[1500,2800],'40〜60㎡':[2200,4200],'60〜80㎡':[3200,5800],'80〜100㎡':[4500,7500],'100㎡〜':[6000,12000]}},
      '戸建て':{area:{'〜20㎡':[1000,1800],'20〜40㎡':[1800,3200],'40〜60㎡':[2500,4800],'60〜80㎡':[3500,6500],'80〜100㎡':[5000,8500],'100㎡〜':[7000,14000]}},
      '土地':{area:{'〜20㎡':[600,1200],'20〜40㎡':[1200,2500],'40〜60㎡':[2000,4000],'60〜80㎡':[3000,5500],'80〜100㎡':[4000,7000],'100㎡〜':[5500,11000]}},
      'ビル一棟':{flat:[5000,12000]},
      'マンション一棟':{flat:[6000,15000]},
      'アパート一棟':{flat:[3000,7000]},
    };
    const ageAdj={'新築〜5年':1.15,'6〜10年':1.05,'11〜20年':0.95,'21〜30年':0.82,'31年以上':0.68,'不明':0.9};
    const adj=ageAdj[this.answers.building_age]||0.9;
    const typeData=basePriceByType[type]||basePriceByType['マンション'];
    let base;
    if(typeData.flat){
      // 一棟物件は面積選択なしで固定レンジ
      base=typeData.flat;
    }else{
      base=(typeData.area&&typeData.area[this.answers.floor_area])||typeData.area['40〜60㎡']||[2500,4500];
    }
    const jitter=()=>Math.floor((Math.random()-.5)*base[0]*.06);
    return{low:Math.round(base[0]*adj)+jitter(),high:Math.round(base[1]*adj)+jitter()};
  }

  getTodayCount(){const d=new Date();return 28+((d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())%25)}

  async showComplete(){
    if(this.isCompleted)return;this.isCompleted=true;
    const esc=(s)=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    this.inputInner.innerHTML='';this.progressFill.style.width='100%';this.progressPct.textContent='100%';
    const tb=document.getElementById('trustBar');if(tb)tb.style.display='none';
    await this.addBotMessage('おつかれさまでした！<br>査定の結果が出ましたので、ご覧ください。');await this.delay(500);

    const price=this.calcEstimatedPrice();const fL=price.low.toLocaleString();const fH=price.high.toLocaleString();
    const items=[
      {l:'物件種別',v:this.answers.property_type},
      {l:'所在地',v:AREA+' '+(this.answers.town||'')},
      {l:'専有面積',v:this.answers.floor_area},
      {l:'築年数',v:this.answers.building_age},
      {l:'売却時期',v:this.answers.timing}
    ].filter(i=>i.v&&i.v.trim());

    const rc=document.createElement('div');rc.className='result-card';
    rc.innerHTML=`<h3>査定診断レポート</h3><div class="result-summary">${items.map(i=>`<div class="row"><span class="label">${esc(i.l)}</span><span class="value">${esc(i.v)}</span></div>`).join('')}</div><div class="price-estimate"><div class="est-label">AI簡易査定による推定価格</div><div class="est-price"><span class="est-blurred">${fL}</span> 〜 <span class="est-blurred">${fH}</span> <span class="est-unit">万円</span></div><div class="est-note">※ 正確な査定額はLINEでお届けします</div></div>`;
    this.chatArea.appendChild(rc);this.scrollToBottom();await this.delay(600);

    // セッション保存（data属性のGAS Webhook URLへ送信）
    let sid='';
    try{
      const formData={...this.answers,area:AREA,est_low:price.low,est_high:price.high,...this.trackingData,created_at:new Date().toISOString()};
      // source パラメータは _worker.js 側で環境変数 SITE_SOURCE から付与される
      const res=await fetch('/api/session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(formData)});
      const data=await res.json();sid=data.session_id||'';this._source=data.source||'';
    }catch(e){console.error('セッション保存失敗:',e);sid='s_'+Date.now();this._source=''}

    // TikTok SubmitForm イベント
    this.trackEvent('SubmitForm',{content_name:this.answers.property_type,value:1,currency:'JPY'});
    if(typeof dataLayer!=='undefined')dataLayer.push({event:'form_complete',property_type:this.answers.property_type,area:AREA,est_low:price.low,est_high:price.high});

    // LINE CTA固定ボタンを表示
    const inputArea=document.getElementById('inputArea');
    inputArea.style.display='none';
    this.chatArea.style.paddingBottom='140px';
    const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const sourceParam=this._source?`&source=${encodeURIComponent(this._source)}`:'';const separator=LINE_ADD_URL.includes('?')?'&':'?';const lineUrl=`${LINE_ADD_URL}${separator}ref=${sid}${sourceParam}`;
    const ctaFixed=document.getElementById('lineCtaFixed');
    const ctaBtn=document.getElementById('lineCtaBtn');
    ctaBtn.href=lineUrl;
    if(!isMobile){ctaBtn.target='_blank';ctaBtn.rel='noopener'}
    ctaBtn.addEventListener('click',e=>{
      this.trackEvent('CompleteRegistration',{content_name:this.answers.property_type,value:1,currency:'JPY'});
      if(typeof dataLayer!=='undefined')dataLayer.push({event:'line_friend_add',property_type:this.answers.property_type,area:AREA,est_low:price.low,est_high:price.high});
      if(isMobile){e.preventDefault();if(navigator.sendBeacon){navigator.sendBeacon('/api/session?ping=1');setTimeout(()=>{location.href=lineUrl},50)}else{setTimeout(()=>{location.href=lineUrl},300)}}
    });
    document.getElementById('todayCount').textContent=this.getTodayCount();
    ctaFixed.style.display='flex';

    // チャットエリアにもCTA表示
    await this.addBotMessage('正確な査定額は<b>LINE</b>でお届けします。<br>下のボタンからお友だち追加してください！');
    this.scrollToBottom();this.isComplete=true;
  }

  async goBack(){
    if(this.stepIndex<=0||this.isProcessing)return;
    this.isProcessing=true;
    const prev=this.getPrevStepIndex(this.stepIndex);
    const cc=this.stepHistory[this.stepIndex]||0;for(let i=0;i<cc;i++){const l=this.chatArea.lastElementChild;if(l)l.remove()}
    const le=this.chatArea.lastElementChild;if(le&&le.classList.contains('msg-user'))le.remove();
    const cp=this.stepHistory[prev]||0;for(let i=0;i<cp;i++){const l=this.chatArea.lastElementChild;if(l)l.remove()}
    const cs=STEPS[this.stepIndex],ps=STEPS[prev];if(cs)delete this.answers[cs.id];if(ps)delete this.answers[ps.id];
    this.inputInner.innerHTML='';await this.showStep(prev);
    this.isProcessing=false;
  }
}
document.addEventListener('DOMContentLoaded',()=>new ChatForm());
</script>
</body>
</html>
